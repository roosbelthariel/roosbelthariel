<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Osita ❤️</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(to bottom, #ffe6f2, #fff0f5);
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #e91e63;
            font-size: 2.5em;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 30px auto;
        }
        .gallery img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.2);
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        audio {
            width: 80%;
            max-width: 500px;
            margin: 30px auto;
            display: block;
        }
        .message {
            font-size: 1.3em;
            max-width: 700px;
            margin: 25px auto;
            line-height: 1.6;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <h1>Para Mi Osita ❤️</h1>
    
    <p class="message">
        Feliz mi osita ❤️<br><br>
        Espero que disfrutes mi pequeño presente. Quiero que sepas que te amo mucho y te estimo demasiado. 
        Pareciera que peleamos menos y espero que siga así, que podamos entendernos mejor y apoyarnos uno al otro día a día. 
        Te amo.
    </p>
    
    <!-- Photo Gallery -->
    <div class="gallery">
        <img src="https://drive.google.com/uc?export=download&id=1v75KAyj7pMcM8oe9qlKcPdnCxcE7X5Vy" alt="Memory 1">
        <img src="https://drive.google.com/uc?export=download&id=1jCWWJhf26_h_Jp5rdI99GyDUOTOjkdG-" alt="Memory 2">
        <img src="https://drive.google.com/uc?export=download&id=1pIWQN3XGtWLEDKZokdA51igHgbjfi9cG" alt="Memory 3">
    </div>
    
    <!-- Song Player -->
    <audio controls autoplay loop>
        <source src="https://drive.google.com/uc?export=download&id=11Y_hiIhTeT0pC7EqVzwML-N8XuDefsIk" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>
    
    <p class="message">Te amo mucho, mi amor ❤️</p>
</body>
</html>
